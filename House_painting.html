<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Painting</title>
  <link rel="stylesheet" href="House_painting.css">
</head>
<body>
  <div class="bg-upper"></div>
  <div id="house">
    <div id="chimney">
      <div class="smoke"></div>
      <div class="chimney-cross"></div>
      <div class="chimney-cross one"></div>
      <div class="chimney-cross two"></div>
      <div class="chimney-cross three"></div>
      <div class="chimney-cross four"></div>
      <div class="chimney-cross five"></div>
      <div class="chimney-cross six"></div>
      <div class="chimney-cross eight"></div>
      <div class="chimney-cross nine"></div>
      <div class="chimney-cross ten"></div>
      <div class="chimney-cross eleven"></div>
      <div class="chimney-cross twelve"></div>
    </div>
    <div id="roof"></div>
    <div id="roof-back"></div>
    <div id="window-1"><div class="win-divide"></div></div>
    <div id="window-2"><div class="win-divide"></div></div>
    <div id="door"><div class="door-knob"></div></div>
    <div class="label"><p>Welcome</p></div>
  </div>
  <div class="bg-lower"></div>
</body>
</html>
